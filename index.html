<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Trình mô phỏng Pháo hoa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link rel="shortcut icon" type="image/png" href="./assets/img/firework-burst-icon-v2.png">
    <link rel="icon" type="image/png" href="./assets/img/firework-burst-icon-v2.png">
    <link rel="apple-touch-icon-precomposed" href="./assets/img/firework-burst-icon-v2.png">
    <meta name="msapplication-TileColor" content="#000000">
    <meta name="msapplication-TileImage" content="./assets/img/firework-burst-icon-v2.png">
    <link rel="stylesheet" href="./assets/css/css2.css">
    <link rel="stylesheet" href="./assets/css/reset-2.0.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">

</head>

<body>
    <!-- Bộ biểu tượng SVG -->
    <div style="height: 0; width: 0; position: absolute; visibility: hidden;">
        <svg xmlns="http://www.w3.org/2000/svg">
            <symbol id="icon-play" viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z" />
            </symbol>
            <symbol id="icon-pause" viewBox="0 0 24 24">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
            </symbol>
            <symbol id="icon-close" viewBox="0 0 24 24">
                <path
                    d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
            </symbol>
            <symbol id="icon-settings" viewBox="0 0 24 24">
                <path
                    d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z" />
            </symbol>
            <symbol id="icon-sound-on" viewBox="0 0 24 24">
                <path
                    d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
            </symbol>
            <symbol id="icon-sound-off" viewBox="0 0 24 24">
                <path
                    d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
            </symbol>
        </svg>
    </div>

    <!-- Ứng dụng chính -->
    <div class="container">
        <div class="start-screen">
            <div class="start-screen__content">
                <h1 class="start-screen__title">Xin chào!</h1>
                <p class="start-screen__subtitle">Chào mừng bạn đến với màn trình diễn pháo hoa của Mr. Nam</p>
                <button class="btn-start">Bắt đầu</button>
            </div>
        </div>
        <div class="loading-init remove">
            <div class="loading-init__header">Đang tải</div>
            <div class="loading-init__status">Đang chuẩn bị màn trình diễn...</div>
        </div>
        <div class="stage-container remove">
            <div class="background-image"></div>
            <div class="canvas-container">
                <canvas id="trails-canvas"></canvas>
                <canvas id="main-canvas"></canvas>
            </div>
            <div class="controls">
                <div class="btn pause-btn">
                    <svg fill="white" width="24" height="24">
                        <use href="#icon-pause" xlink:href="#icon-pause"></use>
                    </svg>
                </div>
                <div class="btn sound-btn">
                    <svg fill="white" width="24" height="24">
                        <use href="#icon-sound-off" xlink:href="#icon-sound-off"></use>
                    </svg>
                </div>
                <div class="btn settings-btn">
                    <svg fill="white" width="24" height="24">
                        <use href="#icon-settings" xlink:href="#icon-settings"></use>
                    </svg>
                </div>
            </div>
            <div class="menu hide">
                <div class="menu__inner-wrap">
                    <div class="btn btn--bright close-menu-btn">
                        <svg fill="white" width="24" height="24">
                            <use href="#icon-close" xlink:href="#icon-close"></use>
                        </svg>
                    </div>
                    <div class="menu__header">Cài đặt</div>
                    <div class="menu__subheader">Nhấp vào nhãn bất kỳ để xem thêm thông tin.</div>
                    <form>
                        <div class="form-option form-option--checkbox-list">
                            <label class="shell-type-label">Loại pháo</label>
                            <div class="shell-type-list"></div>
                        </div>
                        <div class="form-option form-option--text">
                            <label class="custom-text-label">Văn bản</label>
                            <input class="custom-text" type="text"
                                placeholder="Nhập chữ, dùng dấu phẩy (,) để ngăn cách" maxlength="50" />
                        </div>
                        <div class="form-option form-option--select">
                            <label class="shell-size-label">Kích thước pháo</label>
                            <select class="shell-size"></select>
                        </div>
                        <div class="form-option form-option--select">
                            <label class="quality-ui-label">Chất lượng</label>
                            <select class="quality-ui"></select>
                        </div>
                        <div class="form-option form-option--select">
                            <label class="sky-lighting-label">Ánh sáng bầu trời</label>
                            <select class="sky-lighting"></select>
                        </div>
                        <div class="form-option form-option--select">
                            <label class="scaleFactor-label">Tỉ lệ</label>
                            <select class="scaleFactor"></select>
                        </div>
                        <div class="form-option form-option--checkbox">
                            <label class="auto-launch-label">Tự động bắn</label>
                            <input class="auto-launch" type="checkbox" />
                        </div>
                        <div class="form-option form-option--checkbox form-option--finale-mode">
                            <label class="finale-mode-label">Chế độ kết thúc</label>
                            <input class="finale-mode" type="checkbox" />
                        </div>
                        <div class="form-option form-option--checkbox">
                            <label class="hide-controls-label">Ẩn điều khiển</label>
                            <input class="hide-controls" type="checkbox" />
                        </div>
                        <div class="form-option form-option--checkbox">
                            <label class="show-background-label">Hiển thị nền</label>
                            <input class="show-background" type="checkbox" />
                        </div>
                        <div class="form-option form-option--checkbox form-option--fullscreen">
                            <label class="fullscreen-label">Toàn màn hình</label>
                            <input class="fullscreen" type="checkbox" />
                        </div>
                        <div class="form-option form-option--checkbox">
                            <label class="long-exposure-label">Mở màn trập</label>
                            <input class="long-exposure" type="checkbox" />
                        </div>
                    </form>
                    <div class="menu__builder-link" style="margin: 20px 0; padding: 0 10px;">
                        <a href="builder.html" class="btn btn--bright" style="width: 100%; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; background: #4f46e5; border: none;">
                            <svg fill="white" width="20" height="20" style="margin-right: 5px;">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
                            </svg>
                            Tạo kịch bản pháo hoa
                        </a>
                    </div>
                    <div class="credits">
                        Được xây dựng đầy tâm huyết bởi V H Nam.
                    </div>
                </div>
            </div>
        </div>
        <div class="help-modal">
            <div class="help-modal__overlay"></div>
            <div class="help-modal__dialog">
                <div class="help-modal__header"></div>
                <div class="help-modal__body"></div>
                <button type="button" class="help-modal__close-btn">Đóng</button>
            </div>
        </div>
    </div>
    <script src='./assets/js/fscreen@1.0.1.js'></script>
    <script src='./assets/js/Stage@0.1.4.js'></script>
    <script src='./assets/js/MyMath.js'></script>
    <script type="module" src="./assets/js/script.js"></script>

</body>

</html>
